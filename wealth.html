<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC Ticker Lookup Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* Search Bar */
        .search-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-group input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            text-transform: uppercase;
        }

        .search-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-group button {
            width: auto;
        }

        /* Results area */
        .results-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .filing-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: rgba(0,0,0,0.2);
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .filing-item:hover {
            transform: translateY(-2px);
            background-color: rgba(59, 130, 246, 0.05);
            border-color: var(--primary);
        }

        .filing-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .filing-type {
            font-weight: bold;
            color: var(--primary);
        }

        .filing-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .filing-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            color: var(--text-main);
        }
        
        .view-btn {
            background-color: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filing-link:hover .view-btn {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SEC Ticker Lookup</h1>
    
    <div class="card">
        <h2>Company Filings</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">Search for a public company ticker to fetch recent 10-K, 10-Q, and 8-K filings from the SEC EDGAR API.</p>
        
        <div class="search-group">
            <input type="text" id="ticker-input" placeholder="e.g. AAPL" onkeypress="handleEnter(event)">
            <button class="btn" onclick="fetchFilings()">Search</button>
        </div>
        <div id="sec-error" class="error-message"></div>

        <div id="sec-loader" style="text-align: center; display: none; margin-top: 1rem;">
            <div class="loader"></div>
            <p style="font-size: 0.9rem; color: var(--text-muted);">Fetching from SEC EDGAR API...</p>
        </div>

        <div class="results-container" id="sec-results">
            <!-- Filing items will be injected here -->
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';

    function handleEnter(event) {
        if (event.key === 'Enter') {
            fetchFilings();
        }
    }

    async function fetchFilings() {
        const ticker = document.getElementById('ticker-input').value.trim();
        if (!ticker) return;

        const loader = document.getElementById('sec-loader');
        const results = document.getElementById('sec-results');
        const errorDiv = document.getElementById('sec-error');

        loader.style.display = 'block';
        results.innerHTML = '';
        errorDiv.style.display = 'none';

        try {
            const response = await fetch(`${API_URL}/sec/filings?ticker=${ticker}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to fetch filings');
            }

            if (data.filings.length === 0) {
                results.innerHTML = '<p style="color:var(--text-muted)">No recent 10-K, 10-Q, or 8-K filings found.</p>';
                return;
            }

            data.filings.forEach(filing => {
                const item = document.createElement('div');
                item.className = 'filing-item';
                item.innerHTML = `
                    <div class="filing-info">
                        <span class="filing-type">${filing.form}</span>
                        <span class="filing-date">${filing.date}</span>
                    </div>
                    <a href="${filing.url}" target="_blank" class="filing-link">
                        <button class="view-btn">View Document</button>
                    </a>
                `;
                results.appendChild(item);
            });

        } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
